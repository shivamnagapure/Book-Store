version: "3.8"
name: 'Book-Store'
services:
  catalog-service:
    image: shivamnagapure/bookstore-catalog-service
    container_name: catalog-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:postgresql://catalog-db:5432/postgres
      #catalog-db:5432/postgres container name and container port
      - DB_USERNAME=postgres
      - DB_PASSWORD=Shivam@123

    #If we make request on localhost:8081, it delegates to container port 8081
    ports:
      - "8081:8081"

    restart: unless-stopped
    depends_on:
      catalog-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 700m