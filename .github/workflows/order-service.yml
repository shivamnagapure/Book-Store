name: Order Service

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/bookstore-order-service

    steps:
      # 1. Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Build only order-service module
      - name: Build with Maven
        run: mvn -pl order-service -am clean verify

      # 4. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build Docker Image with correct name
      - name: Build Docker Image
        run: |
          mvn -pl order-service spring-boot:build-image \
          -Dspring-boot.build-image.imageName=$IMAGE_NAME

      # 6. Push Docker Image
      - name: Push Docker Image
        run: docker push $IMAGE_NAME