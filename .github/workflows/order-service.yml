name: Order Service

on:
  push:
    paths:
      - main
    branches:
      - '**'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      working-directory: ./order-service
      DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME}}/bookstore-order-service
    defaults:
      #sets a default working directory for all run commands in this job ,  means all run commands run inside this directory
      run:
        working-directory: ${{env.working-directory}}

    # this step downloads your GitHub repository code into the runner (VM)
    steps:
      - uses: actions/checkout@v4

      - name: SetUp Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw -ntp verify

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{ secrets.DOCKER_TOKEN}}

      - name: Build and Publish Docker Image
        run: |
          ./mvnw spring-boot:build-image -DskipTests
          echo "Pushing the image $DOCKER_IMAGE_NAME to Docker Hub ... "
          docker push $DOCKER_IMAGE_NAME