name: Notification Service

on:
  push:
    branches:
      - main
    paths:
      - 'notification-service/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      #1. Get Code
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      #2. SetUp Java
      - name: SetUp Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Login to Docker Hub
      - if: ${{ github.ref == 'refs/heads/main' }}
        name: Login To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: mvn -pl notification-service spring-boot:build-image \
          -Dspring-boot.build-image.imageName=${{ secrets.DOCKERHUB_USERNAME }}/bookstore-notification-service:latest

      - if: ${{ github.ref == 'refs/heads/main' }}
        name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/bookstore-notification-service:latest


